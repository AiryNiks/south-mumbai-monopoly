<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="South Mumbai Business Game emblem">
  <!-- Warm charcoal plate -->
  <rect width="64" height="64" rx="14" fill="#1B1713"/>
  <!-- Double Deco ring -->
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#C9A45C" stroke-width="2"/>
  <circle cx="32" cy="32" r="23" fill="none" stroke="#E4CE96" stroke-width="0.7" opacity="0.8"/>
  <!-- Sunburst fan rising inside the gateway -->
  <g stroke="#E4CE96" stroke-width="1.05" opacity="0.9">
    <line x1="32" y1="41.5" x2="32"   y2="24.2"/>
    <line x1="32" y1="41.5" x2="26.6" y2="25.9"/>
    <line x1="32" y1="41.5" x2="37.4" y2="25.9"/>
    <line x1="32" y1="41.5" x2="24.9" y2="31"/>
    <line x1="32" y1="41.5" x2="39.1" y2="31"/>
  </g>
  <!-- Gateway arch band -->
  <path fill="#C9A45C" fill-rule="evenodd" d="M20.5 43.5 V29.5 A11.5 11.5 0 0 1 43.5 29.5 V43.5 H39.7 V30.1 A7.7 7.7 0 0 0 24.3 30.1 V43.5 Z"/>
  <!-- Keystone -->
  <path fill="#C9A45C" d="M32 13.9 L34.6 16.8 L32 19.7 L29.4 16.8 Z"/>
  <!-- Stepped plinth -->
  <rect x="17.5" y="43.5" width="29" height="2.6" fill="#C9A45C"/>
  <rect x="20.5" y="47.1" width="23" height="2.2" fill="#C9A45C" opacity="0.75"/>
</svg>
